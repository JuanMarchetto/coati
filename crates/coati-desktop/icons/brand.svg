<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="512" height="512">
      <!-- rounded tile background -->
      <rect width="128" height="128" rx="28" fill="#2A1F16"/>
      <!-- body silhouette -->
      <path d="M28 90
               C 28 72, 40 62, 58 62
               L 84 62
               C 94 62, 100 70, 100 82
               L 100 96
               C 100 102, 96 106, 90 106
               L 40 106
               C 32 106, 28 100, 28 90 Z"
            fill="#E67347"/>
      <!-- face mask (darker band) -->
      <path d="M56 64 C 62 58, 78 58, 84 64 L 84 74 C 78 78, 62 78, 56 74 Z" fill="#1A130E" opacity="0.35"/>
      <!-- long snout extending up-forward -->
      <path d="M82 66
               C 90 58, 98 46, 104 36
               C 106 32, 108 30, 112 30"
            stroke="#E67347" stroke-width="10" stroke-linecap="round" fill="none"/>
      <!-- magnifying glass at snout tip -->
      <circle cx="114" cy="28" r="9" fill="none" stroke="#F5ECD8" stroke-width="3.5"/>
      <line x1="120" y1="34" x2="124" y2="38" stroke="#F5ECD8" stroke-width="3.5" stroke-linecap="round"/>
      <!-- eye -->
      <circle cx="70" cy="70" r="2.8" fill="#1A130E"/>
      <!-- ringed tail curl, hinting at terminal prompt -->
      <path d="M28 90
               C 14 90, 10 76, 18 64
               C 24 54, 36 52, 42 58"
            stroke="#6AA07F" stroke-width="6" stroke-linecap="round" fill="none"/>
      <!-- tail rings -->
      <line x1="16" y1="82" x2="22" y2="80" stroke="#1A130E" stroke-width="2"/>
      <line x1="14" y1="76" x2="20" y2="74" stroke="#1A130E" stroke-width="2"/>
      <line x1="16" y1="70" x2="22" y2="68" stroke="#1A130E" stroke-width="2"/>
    </svg>